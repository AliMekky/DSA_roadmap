<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Pattern Recognition Map</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg: #0e0f14;
  --bg2: #13151e;
  --bg3: #1a1d28;
  --border: rgba(255,255,255,0.07);
  --border-hover: rgba(255,255,255,0.18);
  --text: #e8e9f0;
  --text2: #8b8fa8;
  --text3: #5a5e74;
  --radius: 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.root { position: relative; z-index: 1; max-width: 1140px; margin: 0 auto; padding: 2.5rem 1.5rem; }

.header { margin-bottom: 2rem; }
h1 {
  font-size: 26px; font-weight: 600; letter-spacing: -0.5px;
  background: linear-gradient(135deg, #e8e9f0 30%, #7b82ff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 6px;
}
.subtitle { font-size: 13px; color: var(--text2); line-height: 1.6; }

.search-row { display: flex; gap: 8px; margin-bottom: 1rem; }
.search-row input {
  flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px;
  background: var(--bg2); color: var(--text); font-size: 14px; font-family: inherit; outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.search-row input::placeholder { color: var(--text3); }
.search-row input:focus { border-color: rgba(123,130,255,0.5); box-shadow: 0 0 0 3px rgba(123,130,255,0.1); }

.filter-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.5rem; }
.chip {
  font-size: 11px; font-weight: 500; padding: 5px 11px; border-radius: 20px;
  border: 1px solid var(--border); cursor: pointer; background: var(--bg2);
  color: var(--text2); transition: all .15s; letter-spacing: 0.01em;
}
.chip:hover { border-color: var(--border-hover); color: var(--text); }

.decider { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.1rem 1.25rem; margin-bottom: 1.5rem; }
.decider-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }
.decider-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.dq {
  font-size: 12px; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px;
  cursor: pointer; background: var(--bg3); color: var(--text2); text-align: left;
  transition: all .15s; line-height: 1.4; font-family: inherit;
}
.dq:hover { border-color: var(--border-hover); color: var(--text); background: var(--bg2); }
.dq strong { display: block; font-size: 11px; font-weight: 500; color: var(--text); margin-bottom: 2px; }

.count { font-size: 12px; color: var(--text3); margin-bottom: .75rem; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 10px; }

.card {
  border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 15px;
  cursor: pointer; transition: border-color .2s, box-shadow .2s, transform .15s;
  background: var(--bg2); position: relative; overflow: hidden;
}
.card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--accent); opacity: 0.85; border-radius: var(--radius) var(--radius) 0 0;
}
.card:hover {
  border-color: var(--accent-border);
  box-shadow: 0 0 0 1px var(--accent-border), 0 8px 32px var(--accent-glow);
  transform: translateY(-2px);
}
.card.hidden { display: none; }

.card-top { display: flex; align-items: center; gap: 9px; margin-bottom: 4px; margin-top: 4px; }
.dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.card-name { font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: -0.1px; }
.card-cat { font-size: 10px; color: var(--text3); font-weight: 500; margin-bottom: 7px; text-transform: uppercase; letter-spacing: .06em; }
.card-clues { font-size: 11px; color: var(--text2); line-height: 1.55; margin-bottom: 9px; }
.card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.tag {
  font-size: 10px; padding: 2px 7px; border-radius: 6px;
  background: var(--accent-bg); color: var(--accent-text);
  font-family: 'JetBrains Mono', monospace; font-weight: 500; border: 1px solid var(--accent-tag-border);
}

/* Modal */
.modal-backdrop {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.72);
  backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; padding: 1rem;
}
.modal-backdrop.open { display: flex; }
.modal {
  background: var(--bg2); border: 1px solid var(--border-hover); border-radius: 16px;
  padding: 0; max-width: 580px; width: 100%; max-height: 88vh; overflow: hidden;
  position: relative; box-shadow: 0 24px 80px rgba(0,0,0,0.6); display: flex; flex-direction: column;
}
.modal-close {
  position: absolute; top: 14px; right: 16px; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 6px; font-size: 14px; cursor: pointer; color: var(--text2);
  width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; transition: all .15s; z-index: 2;
}
.modal-close:hover { color: var(--text); border-color: var(--border-hover); }

/* Tabs */
.modal-tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 1.75rem; flex-shrink: 0; }
.tab-btn {
  font-size: 12px; font-weight: 500; padding: 14px 0; margin-right: 20px;
  background: none; border: none; border-bottom: 2px solid transparent;
  cursor: pointer; color: var(--text3); font-family: inherit; transition: all .15s; letter-spacing: .02em;
}
.tab-btn:hover { color: var(--text2); }
.tab-btn.active { color: var(--text); border-bottom-color: var(--modal-accent, #7b82ff); }

.modal-body { overflow-y: auto; flex: 1; padding: 1.5rem 1.75rem 1.75rem; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

.modal-header { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
.modal-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
.modal-title { font-size: 20px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
.modal-when { font-size: 13px; color: var(--text2); margin-bottom: 16px; line-height: 1.55; }
.section-label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin: 14px 0 7px; }
.signal-list { display: flex; flex-direction: column; gap: 4px; }
.signal-item { font-size: 13px; color: var(--text); padding: 6px 11px; background: var(--bg3); border-radius: 7px; border-left: 3px solid; line-height: 1.4; }
.prob-list { display: flex; flex-wrap: wrap; gap: 6px; }
.prob-pill { font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); color: var(--text2); background: var(--bg3); font-family: 'JetBrains Mono', monospace; }
.hybrid-list { display: flex; flex-direction: column; gap: 5px; }
.hybrid-item { font-size: 12px; color: var(--text2); padding: 6px 11px; background: var(--bg3); border-radius: 7px; line-height: 1.45; }
.hybrid-item strong { color: var(--text); font-weight: 500; }
.tip-box { background: var(--bg3); border-radius: 9px; padding: 11px 13px; font-size: 12.5px; color: var(--text2); line-height: 1.65; border-left: 3px solid; margin-top: 14px; }

/* Thinking panel */
.q-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.q-item { background: var(--bg3); border-radius: 10px; padding: 12px 14px; border: 1px solid var(--border); }
.q-num { font-size: 10px; font-weight: 600; color: var(--modal-accent, #7b82ff); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; font-family: 'JetBrains Mono', monospace; }
.q-text { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 6px; line-height: 1.4; }
.q-hints { display: flex; flex-direction: column; gap: 3px; }
.q-hint { font-size: 12px; color: var(--text2); padding-left: 12px; position: relative; line-height: 1.45; }
.q-hint::before { content: '›'; position: absolute; left: 0; color: var(--modal-accent, #7b82ff); }

.checklist-box { background: var(--bg3); border-radius: 10px; padding: 14px 16px; border: 1px solid var(--border); border-left: 3px solid var(--modal-accent, #7b82ff); }
.checklist-title { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }
.checklist-items { display: flex; flex-direction: column; gap: 6px; }
.cl-item { display: flex; align-items: flex-start; gap: 8px; font-size: 12.5px; color: var(--text2); line-height: 1.4; }
.cl-num { font-size: 10px; font-weight: 600; color: var(--modal-accent, #7b82ff); font-family: 'JetBrains Mono', monospace; min-width: 18px; margin-top: 1px; }

.empty { text-align: center; padding: 2.5rem; color: var(--text3); font-size: 14px; grid-column: 1/-1; }
@media(max-width:600px){ .decider-grid{ grid-template-columns:1fr } }
</style>
</head>
<body>
<div class="root">
  <div class="header">
    <h1>DSA Pattern Recognition Map</h1>
    <p class="subtitle">Click any card for signals, tricks, and a step-by-step thinking guide &nbsp;·&nbsp; Use the quick-decision buttons to narrow by symptom</p>
  </div>

  <div class="search-row">
    <input id="search" placeholder="Search patterns, signals, or problems..." oninput="filter()">
  </div>

  <div class="filter-row" id="chips"></div>

  <div class="decider" id="decider">
    <div class="decider-title">Quick decision — what does your problem look like?</div>
    <div class="decider-grid" id="dqgrid"></div>
  </div>

  <div class="count" id="count"></div>
  <div class="grid" id="grid"></div>

  <div class="modal-backdrop" id="modal" onclick="closeModal(event)">
    <div class="modal" id="modal-inner">
      <button class="modal-close" onclick="closeModal()">&#10005;</button>
      <div class="modal-tabs" id="modal-tabs">
        <button class="tab-btn active" onclick="switchTab('overview',this)">Overview</button>
        <button class="tab-btn" onclick="switchTab('thinking',this)">How to think</button>
      </div>
      <div class="modal-body">
        <div id="tab-overview" class="tab-panel active"></div>
        <div id="tab-thinking" class="tab-panel"></div>
      </div>
    </div>
  </div>
</div>

<script>
const PALETTE = {
  hash:      { accent:"#8b7ff5", glow:"rgba(139,127,245,0.2)",  bg:"rgba(139,127,245,0.09)", text:"#b8b0ff", tagBorder:"rgba(139,127,245,0.28)" },
  twoptr:    { accent:"#22c98a", glow:"rgba(34,201,138,0.17)",  bg:"rgba(34,201,138,0.08)",  text:"#6ee4b5", tagBorder:"rgba(34,201,138,0.25)" },
  sliding:   { accent:"#f07040", glow:"rgba(240,112,64,0.2)",   bg:"rgba(240,112,64,0.09)",  text:"#ffaa80", tagBorder:"rgba(240,112,64,0.28)" },
  stack:     { accent:"#e85c8a", glow:"rgba(232,92,138,0.2)",   bg:"rgba(232,92,138,0.09)",  text:"#ff9ec0", tagBorder:"rgba(232,92,138,0.28)" },
  binsearch: { accent:"#4c9ef5", glow:"rgba(76,158,245,0.2)",   bg:"rgba(76,158,245,0.09)",  text:"#90c8ff", tagBorder:"rgba(76,158,245,0.28)" },
  heap:      { accent:"#f0a030", glow:"rgba(240,160,48,0.2)",   bg:"rgba(240,160,48,0.09)",  text:"#ffd080", tagBorder:"rgba(240,160,48,0.28)" },
  linkedlist:{ accent:"#60c040", glow:"rgba(96,192,64,0.17)",   bg:"rgba(96,192,64,0.08)",   text:"#a0e880", tagBorder:"rgba(96,192,64,0.25)" },
  trees:     { accent:"#a070f0", glow:"rgba(160,112,240,0.2)",  bg:"rgba(160,112,240,0.09)", text:"#c8a0ff", tagBorder:"rgba(160,112,240,0.28)" },
  graph:     { accent:"#20c890", glow:"rgba(32,200,144,0.17)",  bg:"rgba(32,200,144,0.08)",  text:"#70ddb8", tagBorder:"rgba(32,200,144,0.25)" },
  advgraph:  { accent:"#18a878", glow:"rgba(24,168,120,0.17)",  bg:"rgba(24,168,120,0.08)",  text:"#50c898", tagBorder:"rgba(24,168,120,0.25)" },
  backtrack: { accent:"#e04878", glow:"rgba(224,72,120,0.2)",   bg:"rgba(224,72,120,0.09)",  text:"#ff88b8", tagBorder:"rgba(224,72,120,0.28)" },
  dp1d:      { accent:"#80c830", glow:"rgba(128,200,48,0.17)",  bg:"rgba(128,200,48,0.08)",  text:"#b8e870", tagBorder:"rgba(128,200,48,0.25)" },
  dp2d:      { accent:"#58a820", glow:"rgba(88,168,32,0.17)",   bg:"rgba(88,168,32,0.08)",   text:"#90d050", tagBorder:"rgba(88,168,32,0.25)" },
  greedy:    { accent:"#e89830", glow:"rgba(232,152,48,0.2)",   bg:"rgba(232,152,48,0.09)",  text:"#f8c870", tagBorder:"rgba(232,152,48,0.28)" },
  intervals: { accent:"#d07828", glow:"rgba(208,120,40,0.2)",   bg:"rgba(208,120,40,0.09)",  text:"#f0a850", tagBorder:"rgba(208,120,40,0.28)" },
  trie:      { accent:"#8858e8", glow:"rgba(136,88,232,0.2)",   bg:"rgba(136,88,232,0.09)",  text:"#c0a0ff", tagBorder:"rgba(136,88,232,0.28)" },
  bits:      { accent:"#9898a8", glow:"rgba(152,152,168,0.17)", bg:"rgba(152,152,168,0.08)", text:"#c4c4d4", tagBorder:"rgba(152,152,168,0.25)" },
  math:      { accent:"#5898c8", glow:"rgba(88,152,200,0.17)",  bg:"rgba(88,152,200,0.08)",  text:"#90c8e8", tagBorder:"rgba(88,152,200,0.25)" },
};

const CAT_COLORS = {
  "Lookup & grouping":"#8b7ff5","Array / sorting":"#22c98a","Subarray / substring":"#f07040",
  "Stack & next-greater":"#e85c8a","Sorted / monotonic":"#4c9ef5","Top-K & streams":"#f0a030",
  "Pointer manipulation":"#60c040","Tree traversal":"#a070f0","Graph traversal":"#20c890",
  "Combinatorics":"#e04878","Dynamic programming":"#80c830","Greedy & decisions":"#e89830",
  "String structures":"#8858e8","Math & bits":"#5898c8"
};

const PATTERNS = [
  {
    id:"hash", name:"Hash map / set", cat:"Lookup & grouping",
    when:"You need O(1) average lookup, counting, or grouping",
    signals:["duplicates","frequency counting","membership check","group by key","find complement in O(1)"],
    tricks:["Two Sum: store seen values and look up complement","Anagram: sort key or char-count key","Prefix+hash for subarray-sum problems"],
    hybrids:["Top K Frequent → hash + heap","Min Window Substring → sliding window + hash","Group Anagrams → hash with sorted key"],
    problems:["Two Sum","Contains Duplicate","Valid Anagram","Group Anagrams","Top K Frequent","Valid Sudoku","Longest Consecutive Sequence","Product of Array Except Self"],
    tip:"If the problem says 'O(1) lookup' or 'without sorting', think hash first.",
    questions:[
      { q:"Do I need to look something up in O(1)?", hints:["complement of a value?","has this been seen before?","what's the count of X?"] },
      { q:"What am I storing in the map?", hints:["value → index (Two Sum)","char → frequency (anagram)","key → group (Group Anagrams)","prefix sum → index (subarray sum)"] },
      { q:"What is the key, and what is the value?", hints:["key: the thing you'll look up later","value: the info you need when you find it"] },
      { q:"Do I need a set (membership) or a map (data)?", hints:["set: just need 'have I seen this?'","map: need to retrieve something when found"] },
      { q:"Is there a grouping or equivalence class?", hints:["group by sorted string → anagram","group by tuple → sudoku box","group by remainder → two sum variant"] },
    ],
    checklist:["Identify what you need to look up or count","Choose key and value for the map","Decide: set (membership) vs map (stored data)","Iterate and populate, then query","Handle edge cases: missing key, empty input"]
  },
  {
    id:"twoptr", name:"Two pointers", cat:"Array / sorting",
    when:"Sorted array, pair/triplet sum, palindrome, or optimize from both ends",
    signals:["sorted input","pair sum","triplet sum","palindrome check","shrink from both ends","no extra space"],
    tricks:["Sort first, then move pointers inward","3Sum: fix one, two-pointer on the rest","Trapping water: track running max from both sides"],
    hybrids:["Binary search is two pointers on sorted arrays","Merge sorted lists uses two pointers","Container With Most Water: greedy choice + two pointers"],
    problems:["Valid Palindrome","Two Sum II","3Sum","Container With Most Water","Trapping Rain Water","Remove Duplicates","Sort Colors"],
    tip:"'Sorted + pairs/triples + no extra space' almost always means two pointers.",
    questions:[
      { q:"Is the array sorted, or can I sort it?", hints:["sorting costs O(n log n) — often worth it","if order matters for the answer, you can't sort"] },
      { q:"Where do the two pointers start?", hints:["both at the left (fast/slow — different speeds)","one at each end (left=0, right=n-1)","one fixed, one scanning (3Sum outer loop)"] },
      { q:"What condition moves each pointer?", hints:["sum too small → move left pointer right","sum too large → move right pointer left","palindrome mismatch → done, not palindrome"] },
      { q:"When do I stop?", hints:["when left >= right (they cross)","when a condition is definitively met or broken"] },
      { q:"Do I need to skip duplicates?", hints:["3Sum and 4Sum: skip duplicate values after moving","use while(left < right && arr[left]==arr[left-1]) left++"] },
    ],
    checklist:["Confirm input is sorted (or sort it)","Decide pointer start positions","Define move condition for each pointer","Define the stop condition (crossing or found)","Handle duplicates if needed"]
  },
  {
    id:"sliding", name:"Sliding window", cat:"Subarray / substring",
    when:"Contiguous subarray or substring with a dynamic condition",
    signals:["contiguous subarray","substring","longest/shortest window","at most k distinct","without repeating","contains all of X"],
    tricks:["Expand right, shrink left when condition breaks","Use a hash map to track window contents","Min/max window: shrink until valid, record answer"],
    hybrids:["Minimum Window Substring: sliding window + hash map","Top K: may combine with heap if frequency needed"],
    problems:["Best Time Buy & Sell","Longest Substring Without Repeating","Longest Repeating Char Replacement","Permutation in String","Minimum Window Substring","Sliding Window Maximum"],
    tip:"Contiguous + dynamic condition = sliding window. Fixed-size windows are easier; variable-size need shrink logic.",
    questions:[
      { q:"Is the answer based on a contiguous segment?", hints:["if no: probably not sliding window","subarrays and substrings are always contiguous"] },
      { q:"What makes a window valid or invalid?", hints:["sum <= k? distinct chars <= k? all required chars present?","this is the most important question to answer first"] },
      { q:"What do I need to track inside the window?", hints:["sum (numeric array)","frequency map (string problems)","distinct count","max frequency (character replacement)"] },
      { q:"When do I move the left pointer?", hints:["only when the window becomes invalid","or when shrinking a valid window to find minimum"] },
      { q:"When do I update the answer?", hints:["longest: after every valid window expansion","shortest: while shrinking a valid window","counting: based on number of valid start/end positions"] },
    ],
    checklist:["Confirm the answer is about a contiguous segment","Define window validity condition","Choose tracking structure (sum, map, count)","Expand right pointer always","Shrink left when invalid (or to minimize)","Update answer at the correct moment"]
  },
  {
    id:"stack", name:"Stack / monotonic stack", cat:"Stack & next-greater",
    when:"Bracket matching, undo order, next greater/smaller, or pending resolution",
    signals:["matching brackets","evaluate expression","next warmer day","next greater element","largest rectangle","undo/reverse evaluation"],
    tricks:["Monotonic stack: pop while top <= current (next greater) or >= (next smaller)","Min Stack: keep a parallel min-tracking stack","Histogram: pop and compute area on each taller bar"],
    hybrids:["Car Fleet: sort by position, stack arrival times","Evaluate RPN: pure stack, no monotonic trick needed"],
    problems:["Valid Parentheses","Min Stack","Evaluate Reverse Polish Notation","Daily Temperatures","Car Fleet","Largest Rectangle in Histogram","Asteroid Collision","Remove K Digits"],
    tip:"'When will this be resolved?' is the stack instinct. Push, process later, pop when resolved.",
    questions:[
      { q:"Is there something I can't resolve yet and need to revisit?", hints:["open bracket waiting for its close","element waiting for something larger to appear","expression waiting for next operator"] },
      { q:"Is this a plain stack or a monotonic stack?", hints:["plain: brackets, undo, RPN evaluation","monotonic: next greater/smaller, largest rectangle, span"] },
      { q:"What order does the monotonic stack maintain?", hints:["increasing stack → pop when current > top (next greater)","decreasing stack → pop when current < top (next smaller)"] },
      { q:"What do I do when I pop?", hints:["record 'next greater = current element'","compute area using popped height and current width","resolve the pending bracket or operation"] },
      { q:"What remains in the stack at the end?", hints:["elements with no next greater: answer is -1 or 0","unmatched brackets: invalid input"] },
    ],
    checklist:["Identify if elements need deferred resolution","Choose plain vs monotonic stack","For monotonic: define increasing or decreasing order","Decide what to push (index vs value — usually index)","Define the pop condition and what to compute on pop","Handle remaining stack elements after the loop"]
  },
  {
    id:"binsearch", name:"Binary search", cat:"Sorted / monotonic",
    when:"Sorted data, rotated sorted array, or find min/max valid answer",
    signals:["sorted array","search rotated array","minimum X that satisfies","maximum X still valid","monotonic feasibility","answer space is numeric"],
    tricks:["Binary search on the answer, not the array","left mid = (lo+hi)//2, right mid = (lo+hi+1)//2","For feasibility: define a predicate and binary search on it"],
    hybrids:["Koko Bananas: binary search on rate + greedy feasibility","Time Based KV: binary search on timestamps"],
    problems:["Binary Search","Search 2D Matrix","Search Rotated Sorted Array","Find Min Rotated","Koko Eating Bananas","Capacity to Ship","Median of Two Sorted Arrays","Split Array Largest Sum"],
    tip:"'Smallest/largest valid value' is the binary-search-on-answer signal. Define predicate then search.",
    questions:[
      { q:"Is the search space sorted or monotonic?", hints:["sorted array: classic binary search","answer space: 'smallest X where condition holds' is monotonic"] },
      { q:"Am I searching for a value in an array, or searching for an answer?", hints:["array search: lo=0, hi=n-1, target exists in array","answer search: lo=min possible, hi=max possible, check feasibility"] },
      { q:"What is my predicate (true/false condition)?", hints:["'can I ship packages with capacity X in D days?'","'can Koko eat all bananas at rate X?'","predicate must be monotonic: false...false...true...true"] },
      { q:"Do I want the leftmost or rightmost valid position?", hints:["leftmost (minimum): when true, go left (hi=mid)","rightmost (maximum): when true, go right (lo=mid)"] },

const DECIDER_QS = [
  {q:"Contiguous subarray / substring?", ans:"sliding"},
  {q:"Sorted input or sortable?", ans:"twoptr"},
  {q:"Need O(1) lookup, counts, or grouping?", ans:"hash"},
  {q:"Top-k or repeated min/max?", ans:"heap"},
  {q:"All combinations / permutations?", ans:"backtrack"},
  {q:"Subproblems repeat (best answer)?", ans:"dp1d"},
  {q:"Tree, grid, or graph structure?", ans:"graph"},
  {q:"Overlapping time ranges?", ans:"intervals"},
];

let activeFilter = "";

function pal(id){ return PALETTE[id]||{accent:"#888",glow:"rgba(136,136,136,0.15)",bg:"rgba(136,136,136,0.07)",text:"#aaa",tagBorder:"rgba(136,136,136,0.2)"}; }

function buildChips(){
  const c = document.getElementById("chips");
  const all = document.createElement("span");
  all.className="chip"; all.textContent="All"; all.dataset.all="1";
  all.style.cssText="background:#2a2d3e;color:#e8e9f0;border-color:rgba(255,255,255,0.2)";
  all.onclick=()=>setFilter("");
  c.appendChild(all);
  CATS.forEach(cat=>{
    const col=CAT_COLORS[cat]||"#888";
    const sp=document.createElement("span");
    sp.className="chip"; sp.textContent=cat; sp.dataset.cat=cat;
    sp.style.cssText=`border-color:${col}33;color:var(--text2)`;
    sp.onclick=()=>setFilter(cat);
    c.appendChild(sp);
  });
}

function setFilter(cat){
  activeFilter=cat;
  document.querySelectorAll(".chip").forEach(c=>{
    if(c.dataset.all){
      c.style.cssText=cat===""?"background:#2a2d3e;color:#e8e9f0;border-color:rgba(255,255,255,0.2)":"background:var(--bg2);color:var(--text2);border-color:var(--border)";
    } else {
      const cc=CAT_COLORS[c.dataset.cat]||"#888";
      c.style.cssText=c.dataset.cat===cat?`background:${cc}22;color:${cc};border-color:${cc}66`:`border-color:${cc}33;color:var(--text2);background:var(--bg2)`;
    }
  });
  filter();
}

function buildGrid(){
  const g=document.getElementById("grid");
  PATTERNS.forEach(p=>{
    const pl=pal(p.id);
    const card=document.createElement("div");
    card.className="card"; card.dataset.id=p.id;
    card.style.cssText=`--accent:${pl.accent};--accent-border:${pl.accent}55;--accent-glow:${pl.glow};--accent-bg:${pl.bg};--accent-text:${pl.text};--accent-tag-border:${pl.tagBorder}`;
    card.innerHTML=`
      <div class="card-top">
        <div class="dot" style="background:${pl.accent};box-shadow:0 0 8px ${pl.accent}"></div>
        <span class="card-name">${p.name}</span>
      </div>
      <div class="card-cat">${p.cat}</div>
      <div class="card-clues">${p.signals.slice(0,3).join(" &middot; ")}</div>
      <div class="card-tags">${p.problems.slice(0,3).map(pr=>`<span class="tag">${pr}</span>`).join("")}</div>`;
    card.onclick=()=>openModal(p);
    g.appendChild(card);
  });
}

function buildDecider(){
  const g=document.getElementById("dqgrid");
  DECIDER_QS.forEach(({q,ans})=>{
    const b=document.createElement("button"); b.className="dq";
    const pat=PATTERNS.find(p=>p.id===ans||p.id.startsWith(ans));
    const pl=pat?pal(pat.id):{accent:"#888"};
    b.innerHTML=`<strong>${q}</strong><span style="color:${pl.accent}">${pat?pat.name:""}</span>`;
    b.onclick=()=>openModal(PATTERNS.find(p=>p.id===ans||p.id===ans+"1d")||PATTERNS.find(p=>p.id.startsWith(ans)));
    g.appendChild(b);
  });
}

function filter(){
  const q=document.getElementById("search").value.toLowerCase();
  let visible=0;
  document.querySelectorAll(".card").forEach(card=>{
    const p=PATTERNS.find(x=>x.id===card.dataset.id);
    const matchCat=!activeFilter||p.cat===activeFilter;
    const matchQ=!q||(p.name+p.signals.join()+p.problems.join()+p.tricks.join()).toLowerCase().includes(q);
    card.classList.toggle("hidden",!(matchCat&&matchQ));
    if(matchCat&&matchQ)visible++;
  });
  const em=document.querySelector(".empty");
  if(em)em.remove();
  if(visible===0){
    const d=document.createElement("div"); d.className="empty"; d.textContent="No patterns match — try a different search.";
    document.getElementById("grid").appendChild(d);
  }
  document.getElementById("count").textContent=`Showing ${visible} of ${PATTERNS.length} patterns`;
  document.getElementById("decider").style.display=q?"none":"";
}

function switchTab(name, btn){
  document.querySelectorAll(".tab-panel").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab-"+name).classList.add("active");
  btn.classList.add("active");
}

function openModal(p){
  if(!p) return;
  const pl=pal(p.id); const col=pl.accent;
  document.getElementById("modal-inner").style.setProperty("--modal-accent", col);

  // Reset to overview tab
  document.querySelectorAll(".tab-panel").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab-overview").classList.add("active");
  document.querySelector(".tab-btn").classList.add("active");

  document.getElementById("tab-overview").innerHTML=`
    <div class="modal-header">
      <div class="modal-dot" style="background:${col};box-shadow:0 0 12px ${col}88"></div>
      <div class="modal-title">${p.name}</div>
    </div>
    <div class="modal-when">${p.when}</div>
    <div class="section-label">Signals to look for</div>
    <div class="signal-list">${p.signals.map(s=>`<div class="signal-item" style="border-left-color:${col}">${s}</div>`).join("")}</div>
    <div class="section-label">Key tricks</div>
    <div class="signal-list">${p.tricks.map(s=>`<div class="signal-item" style="border-left-color:${col}88">${s}</div>`).join("")}</div>
    <div class="section-label">Common problems</div>
    <div class="prob-list">${p.problems.map(pr=>`<span class="prob-pill" style="border-color:${col}44;color:${pl.text}">${pr}</span>`).join("")}</div>
    ${p.hybrids.length?`<div class="section-label">Hybrid patterns</div>
    <div class="hybrid-list">${p.hybrids.map(h=>{const[n,...r]=h.split(":");return`<div class="hybrid-item"><strong>${n}</strong>${r.length?": "+r.join(":"):""}</div>`;}).join("")}</div>`:""}
    <div class="tip-box" style="border-left-color:${col}">${p.tip}</div>`;

  const qs = p.questions||[];
  const cl = p.checklist||[];
  document.getElementById("tab-thinking").innerHTML=`
    <div class="modal-header">
      <div class="modal-dot" style="background:${col};box-shadow:0 0 12px ${col}88"></div>
      <div class="modal-title">How to think: ${p.name}</div>
    </div>
    <div class="modal-when">Ask these questions in order when you see a potential match.</div>
    <div class="q-list">${qs.map((q,i)=>`
      <div class="q-item">
        <div class="q-num">Question ${i+1}</div>
        <div class="q-text">${q.q}</div>
        <div class="q-hints">${q.hints.map(h=>`<div class="q-hint">${h}</div>`).join("")}</div>
      </div>`).join("")}
    </div>
    <div class="checklist-box">
      <div class="checklist-title">Final checklist</div>
      <div class="checklist-items">${cl.map((item,i)=>`
        <div class="cl-item">
          <span class="cl-num">${i+1}</span>
          <span>${item}</span>
        </div>`).join("")}
      </div>
    </div>`;

  document.getElementById("modal").classList.add("open");
}

function closeModal(e){
  if(!e||e.target===document.getElementById("modal")){
    document.getElementById("modal").classList.remove("open");
  }
}

document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeModal(); });
buildChips(); buildDecider(); buildGrid();
document.getElementById("count").textContent=`Showing ${PATTERNS.length} of ${PATTERNS.length} patterns`;
</script>
</body>
</html>
